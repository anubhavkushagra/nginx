# nginx.conf
# --------------------------------------------------------
# This configuration file is designed to run on the 3rd Laptop.
# It receives encrypted SSL traffic from the Client laptop,
# decrypts it, and forwards it insecurely to the Backend laptop.

worker_processes auto;

events {
    worker_connections 100000;
}

http {
    # Define the group of unencrypted backend server ports 
    # (Pointing to Laptop 1 - i5 Backend)
    upstream grpc_backend {
        server 192.168.0.130:50051;
        server 192.168.0.130:50052;
        server 192.168.0.130:50053;
        server 192.168.0.130:50054;
        server 192.168.0.130:50055;
        server 192.168.0.130:50056;
        server 192.168.0.130:50057;
        server 192.168.0.130:50058;
    }

    server {
        # Listen for secure inbound traffic from the Client
        listen 443 ssl http2;
        server_name localhost;

        # The SSL certificates (same ones used by the original kv_server)
        ssl_certificate     /path/to/server.crt;
        ssl_certificate_key /path/to/server.key;

        # Optimize SSL overhead
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Route the decrypted HTTP/2 data to the backend
        location / {
            # Strip the authorization header so the backend doesn't have to parse it
            grpc_set_header authorization "";
            
            # Forward as insecure gRPC
            grpc_pass grpc://grpc_backend;
        }
    }
}
